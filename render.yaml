services:
  - type: web
    name: poker-learning-app
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: POKER_DB_PATH
        value: /data/poker_stats.db
    disk:
      name: poker-data
      mountPath: /data
      sizeGB: 1
