<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ポーカーラッシュ</title>
    <link rel="manifest" href="/static/manifest.json">
    <link rel="stylesheet" href="/static/home.css?v=5">
</head>
<body>
    <div class="home-container">
        <!-- Header -->
        <header class="home-header">
            <h1 class="logo-title">ポーカー<span>ラッシュ</span></h1>
            <p class="subtitle">Poker Strategy Training</p>
        </header>

        <!-- Main Menu -->
        <main class="menu-container">
            <button class="menu-btn primary" onclick="location.href='/play'">
                <span class="icon"></span> ゲームスタート (Play)
            </button>
            <button class="menu-btn secondary" onclick="location.href='/stats'">
                <span class="icon"></span> 分析データ (Stats)
            </button>
            <button class="menu-btn outline" id="settings-btn">
                <span class="icon"></span> 設定 (Settings)
            </button>
        </main>
    </div>

    <!-- Settings Modal (iOS-style dark sheet) -->
    <div id="settings-modal" class="home-settings-overlay hidden" onclick="closeHomeSettings()">
        <div class="home-settings-sheet" onclick="event.stopPropagation()">
            <div class="home-settings-header">
                <span class="home-settings-title">設定</span>
                <button onclick="closeHomeSettings()" class="home-settings-done-btn">完了</button>
            </div>
            <div class="home-settings-scroll">

                <div class="home-settings-section-label">表示</div>
                <div class="home-settings-group">
                    <div class="home-settings-row">
                        <div class="home-settings-row-info">
                            <span class="home-settings-row-label">アクション評価</span>
                            <span class="home-settings-row-desc">アクションごとの解説コメントを表示</span>
                        </div>
                        <label class="ios-toggle">
                            <input type="checkbox" id="toggle-feedback" checked>
                            <span class="ios-toggle-track"></span>
                        </label>
                    </div>
                    <div class="home-settings-separator"></div>
                    <div class="home-settings-row">
                        <span class="home-settings-row-label">表示速度</span>
                        <div class="home-settings-segmented">
                            <button class="home-seg-btn active" id="home-seg-normal" onclick="setHomeSpeed('normal')">通常</button>
                            <button class="home-seg-btn" id="home-seg-fast" onclick="setHomeSpeed('fast')">速い</button>
                        </div>
                    </div>
                </div>

                <div class="home-settings-section-label">アカウント</div>
                <div class="home-settings-group">
                    <div class="home-settings-row">
                        <span class="home-settings-row-label">プレミアムプラン</span>
                        <span id="home-premium-status" class="home-premium-status"></span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="/static/home.js?v=2"></script>
</body>
</html>
